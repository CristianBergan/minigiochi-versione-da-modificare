<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA - Centro Comando Giochi</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --space-black: #020617;
            --neon-blue: #38bdf8;
            --text-gray: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-black);
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            color: var(--text-gray);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            animation: stars-move 100s linear infinite;
        }

        @keyframes stars-move {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--nasa-blue), 0 0 20px var(--nasa-blue);
            text-align: center;
            border-bottom: 2px solid var(--nasa-red);
            padding-bottom: 10px;
        }

        .container {
            margin-top: 50px;
            width: 90%;
            max-width: 900px;
            height: 500px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
            position: relative;
            display: flex;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .container::before {
            content: 'SYSTEM_STATUS: ACTIVE';
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 10px;
            color: var(--neon-blue);
            opacity: 0.6;
        }

        .drawer {
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--nasa-red) var(--space-black);
        }

        .drawer::-webkit-scrollbar { width: 8px; }
        .drawer::-webkit-scrollbar-track { background: var(--space-black); }
        .drawer::-webkit-scrollbar-thumb { background: var(--nasa-red); border-radius: 4px; }

        .drawer a {
            display: flex;
            align-items: center;
            color: var(--text-gray);
            text-decoration: none;
            margin-bottom: 20px;
            padding: 15px 25px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            background: rgba(56, 189, 248, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-weight: bold;
            text-transform: uppercase;
        }

        .drawer a::before {
            content: '>';
            margin-right: 15px;
            color: var(--nasa-red);
        }

        .drawer a:hover {
            background-color: rgba(56, 189, 248, 0.2);
            border-color: var(--neon-blue);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            padding-left: 35px;
            color: #fff;
        }

        .footer-decor {
            margin-top: 30px;
            font-size: 12px;
            color: var(--nasa-red);
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(56, 189, 248, 0.1);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <h1>NASA Mission Select</h1>

    <div class="container">
        <div class="scanner"></div>
        <div class="drawer">
            <a href="https://cristianbergan.github.io/Torretta-sparatutto/">Torretta spara tutto</a>
            <a href="https://cristianbergan.github.io/sistema-solare-evolutoss/">Sistema solare evolutoss</a>
            <a href="https://cristianbergan.github.io/sparare-alle-forme/">Sparare alle forme</a>
            <a href="https://cristianbergan.github.io/scappa-dalla-polizia/">Scapa dalla polizia</a>
            <a href="https://cristianbergan.github.io/Nasa/">Nasa</a>
            <a href="https://cristianbergan.github.io/drifting./">Drifting Project</a>
            <a href="https://cristianbergan.github.io/drifting-2.0/">Drifting 2.0</a>
            <a href="https://cristianbergan.github.io/drifting-3.0/">Drifting 3.0</a>
            <a href="https://cristianbergan.github.io/timeline-nasa/">Timeline Nasa</a>
            <a href="https://cristianbergan.github.io/quiz-nasa/">Quiz NASA</a>
            <a href="https://cristianbergan.github.io/dado/">Dado</a>
            <a href="https://cristianbergan.github.io/mix-suoni/">Mix Suoni</a>
            <a href="https://cristianbergan.github.io/spirale-colorata/">Spirale Colorata</a>
        </div>
    </div>

    <div class="footer-decor">EST. 1958 // INTERSTELLAR ENTERTAINMENT</div>

</body>
</html>
